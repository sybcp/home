<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>科技用之于民 | Tech for the People</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        /* 保持你的原有样式不变，省略重复... */
        :root {
            --cursor-size: 20px;
            --cursor-hover-size: 60px;
            --bg-primary: #0a0a0a;
            --bg-secondary: #111;
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.6);
            --border-color: rgba(255, 255, 255, 0.1);
            --accent-glow: rgba(120, 119, 198, 0.15);
            --star-color: rgba(255, 255, 255, 0.8);
        }
        [data-theme="light"] {
            --bg-primary: #f5f5f0;
            --bg-secondary: #ffffff;
            --text-primary: #1a1a1a;
            --text-secondary: rgba(0, 0, 0, 0.6);
            --border-color: rgba(0, 0, 0, 0.1);
            --accent-glow: rgba(255, 193, 7, 0.15);
            --star-color: rgba(0, 0, 0, 0);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            overflow-x: hidden;
            cursor: none;
            transition: background-color 0.8s ease, color 0.8s ease;
        }
        .font-display { font-family: 'Space Grotesk', sans-serif; }
        /* ...此处省略你原有全部其它样式... */
    </style>
</head>
<body>
    <!-- Grain Overlay -->
    <div class="grain"></div>
    <!-- Stars (Night Mode Only) -->
    <div class="stars-container" id="stars"></div>
    <!-- Day Elements (Light Mode Only) -->
    <div class="day-elements">
        <div class="sun"></div>
        <div class="cloud"></div>
        <div class="cloud"></div>
        <div class="cloud"></div>
    </div>
    <!-- Custom Cursor -->
    <div class="cursor"></div>
    <!-- Theme Toggle -->
    <div class="theme-toggle magnetic" onclick="toggleTheme()">
        <div class="toggle-slider">
            <span class="toggle-icon moon-icon">🌙</span>
            <span class="toggle-icon sun-icon">☀️</span>
        </div>
    </div>
    <!-- Navigation -->
    <nav class="nav">
        <div class="logo magnetic">科技用之于民</div>
        <div class="menu-trigger magnetic" onclick="toggleMenu()">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </nav>
    <!-- Fullscreen Menu -->
    <div class="fullscreen-menu" id="menu">
        <a href="#about" class="menu-item" onclick="toggleMenu()">关于</a>
        <a href="#links" class="menu-item" onclick="toggleMenu()">链接</a>
        <a href="#contact" class="menu-item" onclick="toggleMenu()">PERSON</a>
    </div>
    <!-- Hero Section -->
    <section class="hero" id="home">
        <div class="hero-bg"></div>
        <div class="floating-shapes">
            <div class="shape"></div>
            <div class="shape"></div>
            <div class="shape"></div>
        </div>
        <div class="title-container">
            <h1 class="main-title font-display" id="mainTitle">
                <span class="char">科</span>
                <span class="char">技</span>
                <span class="char">用</span>
                <span class="char">之</span>
                <span class="char">于</span>
                <span class="char">民</span>
            </h1>
            <p class="subtitle">Technology for the People</p>
        </div>
        <div class="scroll-indicator">
            <span class="scroll-text">Scroll</span>
            <div class="scroll-line"></div>
        </div>
    </section>
    <!-- About Section -->
    <section class="section" id="about">
        <div class="content-wrapper">
            <h2 class="section-title font-display">关于</h2>
            <p class="interactive-text" id="aboutText">
                这是我搭建的第一个网站，代表着我对前端开发的热爱与探索的开始。
            </p>
        </div>
    </section>
    <!-- Links Section -->
    <section class="section links-section" id="links">
        <div class="content-wrapper">
            <h2 class="section-title font-display">链接</h2>
            <p style="color: var(--text-secondary); margin-bottom: 2rem; transition: color 0.8s;">探索更多内容</p>
            <div class="links-grid">
                <a href="https://space.bilibili.com" target="_blank" class="link-card magnetic">
                    <div class="animated-border"></div>
                    <img src="https://kimi-web-img.moonshot.cn/img/raw.githubusercontent.com/25445537f2fa9f70b4e5b789750310f9f7adf81f.png" alt="Bilibili" class="link-icon" id="bilibiliIcon">
                    <div class="link-title">Bilibili</div>
                    <div class="link-desc">观看视频内容，分享创作灵感</div>
                    <div class="link-arrow">→</div>
                </a>
                <a href="https://github.com" target="_blank" class="link-card magnetic">
                    <div class="animated-border"></div>
                    <img src="https://kimi-web-img.moonshot.cn/img/toppng.com/a0efdbe1d095959928549db4c5dc62afa8657cd1.png" alt="GitHub" class="link-icon" id="githubIcon" style="filter: invert(1);">
                    <div class="link-title">GitHub</div>
                    <div class="link-desc">查看代码仓库，技术开源分享</div>
                    <div class="link-arrow">→</div>
                </a>
            </div>
        </div>
    </section>
    <!-- Contact/Footer Section -->
    <footer class="footer" id="contact">
        <p class="footer-text">© 2026 科技用之于民. CRAFTED WITH PASSION.</p>
    </footer>
    <script>
    // 主题初始化&切换功能实现
    (function () {
        const html = document.documentElement;
        const githubIcon = document.getElementById('githubIcon');
        // 判断本地和系统主题
        function applyTheme(theme) {
            if (theme === "light") {
                html.setAttribute("data-theme", "light");
                if (githubIcon) githubIcon.style.filter = "none";
            } else {
                html.removeAttribute("data-theme");
                if (githubIcon) githubIcon.style.filter = "invert(1)";
            }
        }
        // 读取本地主题
        let theme = localStorage.getItem('theme');
        if (!theme) {
            theme = window.matchMedia('(prefers-color-scheme: light)').matches ? "light" : "dark";
        }
        applyTheme(theme);
        // 监听系统变化（前提本地无偏好时）
        window.matchMedia('(prefers-color-scheme: light)').addEventListener('change', e => {
            if (!localStorage.getItem('theme')) {
                applyTheme(e.matches ? "light" : "dark");
            }
        });
        // 挂载对外切换接口
        window.toggleTheme = function () {
            let themeNow = html.getAttribute("data-theme");
            if (themeNow === "light") {
                html.removeAttribute("data-theme");
                localStorage.setItem("theme", "dark");
                if (githubIcon) githubIcon.style.filter = "invert(1)";
            } else {
                html.setAttribute("data-theme", "light");
                localStorage.setItem("theme", "light");
                if (githubIcon) githubIcon.style.filter = "none";
            }
        };
    })();
    </script>
    <script>
    // 星星生成
    function generateStars() {
        const starsContainer = document.getElementById('stars');
        if (!starsContainer) return;
        const starCount = 100;
        for (let i = 0; i < starCount; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.animationDelay = Math.random() * 3 + 's';
            star.style.animationDuration = (Math.random() * 3 + 2) + 's';
            const size = Math.random() * 2 + 1;
            star.style.width = size + 'px';
            star.style.height = size + 'px';
            starsContainer.appendChild(star);
        }
    }
    generateStars();

    // 其它原有功能略，如自定义光标、交互动画、菜单切换等（保持原有代码）...
    // 下面为保持你交互代码原样，补上剩余部分：

    // 菜单切换
    function toggleMenu() {
        var menu = document.getElementById('menu');
        var trigger = document.querySelector('.menu-trigger');
        if (menu.classList.contains('active')) {
            menu.classList.remove('active');
            trigger.classList.remove('active');
        } else {
            menu.classList.add('active');
            trigger.classList.add('active');
        }
    }

    // 自定义鼠标
    const cursor = document.querySelector('.cursor');
    const magneticElements = document.querySelectorAll('.magnetic');

    if (cursor) {
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX - 10 + 'px';
            cursor.style.top = e.clientY - 10 + 'px';
        });
        document.addEventListener('mouseover', (e) => {
            if (e.target.matches('.magnetic') || e.target.closest('.magnetic')) {
                cursor.classList.add('hover');
            }
        });
        document.addEventListener('mouseout', (e) => {
            if (e.target.matches('.magnetic') || e.target.closest('.magnetic')) {
                cursor.classList.remove('hover');
            }
        });
    }

    // 交互文字波动效果等可继续补足你的原前端代码
    </script>
</body>
</html>
